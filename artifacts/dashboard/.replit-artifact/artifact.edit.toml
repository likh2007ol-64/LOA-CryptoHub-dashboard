kind = "api"
previewPath = "/"
title = "LOA-CryptoHub Dashboard"
version = "1.0.0"
id = "dashboard-loa-cryptohub"

[[services]]
localPort = 8080
name = "LOA-CryptoHub Dashboard"
paths = ["/"]

[services.development]
run = "cd loa-crypto-dashboard && streamlit run app.py --server.port 8080 --server.address 0.0.0.0 --server.headless true"

[services.production.run]
args = ["bash", "-c", "cd loa-crypto-dashboard && streamlit run app.py --server.port 8080 --server.address 0.0.0.0 --server.headless true"]

[services.production.run.env]
PORT = "8080"

[services.production.health.startup]
path = "/"
